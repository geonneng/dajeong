<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보건쌤의 이별 예절 클리닉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Gowun Dodum', sans-serif; background-color: #fff1f2; }
        .clinic-card { background: white; border-radius: 4rem; box-shadow: 0 30px 60px -12px rgba(251, 113, 133, 0.3); }
        .prescription-box { border-left: 10px solid #fb7185; background: #fff5f5; padding: 2rem; border-radius: 0 2rem 2rem 0; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-4xl w-full clinic-card overflow-hidden border-[16px] border-rose-50 flex flex-col min-h-[900px] fade-in">
        
        <div class="bg-rose-500 p-12 text-white text-center">
            <h1 class="text-4xl md:text-5xl font-black italic mb-4">🩺 마음 건강 처방전</h1>
            <p class="text-xl opacity-90 font-bold">보건쌤과 함께하는 1:1 이별 예절 정밀 진단</p>
        </div>

        <div class="p-10 md:p-16 space-y-10 flex-grow">
            <div>
                <label class="block text-gray-700 text-2xl font-black mb-6">✍️ 내가 작성한 메시지</label>
                <textarea id="msgInput" rows="5" class="w-full p-8 text-2xl border-4 border-rose-100 rounded-[3rem] focus:outline-none focus:border-rose-400 transition-all bg-rose-50/30" placeholder="친구를 배려하는 마음을 담아 적어보세요..."></textarea>
            </div>

            <button onclick="diagnose()" class="w-full bg-rose-500 hover:bg-rose-600 text-white text-3xl font-black py-8 rounded-[3rem] shadow-2xl transform active:scale-95 transition-all">
                보건쌤의 정밀 진단 시작 ✨
            </button>

            <div id="resultArea" class="hidden fade-in space-y-12 pt-12 border-t-8 border-dotted border-rose-100">
                
                <div class="text-center bg-white p-10 rounded-[4rem] border-8 border-rose-50 shadow-inner">
                    <p class="text-gray-400 text-xl font-bold mb-4 uppercase tracking-widest">Etiquette Score</p>
                    <div id="scoreDisplay" class="text-9xl font-black text-rose-500 mb-6 tracking-tighter">0</div>
                    <div id="gradeTag" class="inline-block px-12 py-3 rounded-full text-white font-black text-2xl shadow-lg">등급 계산 중...</div>
                </div>

                <div id="diagList" class="space-y-10">
                    </div>

                <div class="bg-blue-50 p-8 rounded-[3rem] border-4 border-blue-100 text-center">
                    <p class="text-blue-700 text-xl font-bold italic leading-relaxed break-keep">
                        "점수보다 중요한 것은 진심을 전하려는 노력입니다.<br>부족한 점을 보완해 더 멋진 사람이 되어볼까요?"
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function diagnose() {
            const text = document.getElementById('msgInput').value;
            const resArea = document.getElementById('resultArea');
            const scoreDisp = document.getElementById('scoreDisplay');
            const gradeDisp = document.getElementById('gradeTag');
            const list = document.getElementById('diagList');

            if (!text.trim()) { alert("메시지를 입력해주세요!"); return; }

            let score = 0;
            let reports = [];

            // 1. 인사와 고마움 (25점)
            if (text.includes("고마") || text.includes("감사")) {
                score += 25;
                reports.push({ status: "good", t: "✅ 따뜻한 감사 인사", d: "함께한 시간을 긍정적으로 마무리하는 태도가 훌륭합니다. 상대방의 자존감을 지켜주는 아주 예의 바른 태도예요." });
            } else {
                reports.push({ status: "bad", t: "🚨 감사의 마음이 빠졌어요", d: "관계를 끝낼 때 고마움을 전하는 것은 상대방에 대한 최소한의 예우입니다. '그동안 고마웠어'라는 한 마디를 추가해 보세요." });
            }

            // 2. 비난 금지 & 나-전달법 (25점)
            if (text.includes("너 때문") || text.includes("니가") || text.includes("너가")) {
                score += 0;
                reports.push({ status: "bad", t: "🚨 비난의 언어가 섞여 있어요", d: "상대방의 탓을 하는 말은 끝인사를 싸움으로 바꿉니다. 상대방에게 큰 심리적 상처를 줄 수 있으니 주의가 필요해요." });
            } else {
                score += 25;
                reports.push({ status: "good", t: "✅ 성숙한 의사전달", d: "상대방을 탓하지 않고 본인의 상황과 마음을 차분하게 설명했습니다. 갈등을 줄이는 성숙한 소통 방식입니다." });
            }

            // 3. 비밀 유지 약속 (25점)
            if (text.includes("비밀") || text.includes("약속") || text.includes("우리끼리")) {
                score += 25;
                reports.push({ status: "good", t: "✅ 사생활 보호 약속", d: "이별 후 가장 중요한 것은 서로의 비밀을 지켜주는 것입니다. 2차 피해를 막으려는 보건적 관점의 예절이 아주 훌륭해요!" });
            } else {
                reports.push({ status: "bad", t: "🚨 비밀 유지 약속이 필요해요", d: "사귀는 동안 알게 된 서로의 프라이버시는 헤어진 후에도 지켜줘야 합니다. '우리 비밀은 지켜주자'는 약속을 꼭 넣어주세요." });
            }

            // 4. 정중함과 길이 (25점)
            if (text.length >= 40) {
                score += 25;
            } else if (text.length >= 20) {
                score += 15;
            } else {
                score += 5;
                reports.push({ status: "bad", t: "🚨 너무 짧은 메시지", d: "단답형 이별 통보는 상대방에게 존중받지 못한다는 느낌을 줍니다. 조금 더 진지하게 마음을 정리해 보세요." });
            }

            // 5점 단위 조정 (이미 계산이 5점 단위이지만 확실히 함)
            score = Math.floor(score / 5) * 5;
            score = Math.max(0, Math.min(100, score));

            // 화면 렌더링
            scoreDisp.innerText = score;
            
            let grade = ""; let color = "";
            if(score >= 90) { grade = "매너의 신 👑"; color = "bg-yellow-400"; }
            else if(score >= 70) { grade = "예절 우수생 👍"; color = "bg-green-500"; }
            else if(score >= 40) { grade = "매너 꿈나무 🌱"; color = "bg-blue-500"; }
            else { grade = "재교육 필요 🚨"; color = "bg-rose-500"; }

            gradeDisp.innerText = grade;
            gradeDisp.className = `inline-block px-12 py-3 rounded-full text-white font-black text-2xl shadow-lg ${color}`;

            list.innerHTML = "";
            reports.forEach(r => {
                const colorClass = r.status === "good" ? "text-green-600" : "text-rose-600";
                list.innerHTML += `
                    <div class="prescription-box shadow-sm">
                        <h4 class="text-2xl font-black ${colorClass} mb-3">${r.t}</h4>
                        <p class="text-gray-700 text-xl leading-relaxed break-keep font-medium">${r.d}</p>
                    </div>`;
            });

            resArea.classList.remove('hidden');
            resArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
